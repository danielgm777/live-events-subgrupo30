<div class="container favoritos-container">
  <div class="row">
    <div class="col-12 col-sm-6 col-md-4 mb-4" *ngFor="let evento of favoritos">

      <app-evento-component *ngFor="let evento of favoritos" [evento]="evento" [esFavorito]="true"
        (eliminarEvento)="eliminar($event)">
      </app-evento-component>

    </div>
  </div>
</div>
