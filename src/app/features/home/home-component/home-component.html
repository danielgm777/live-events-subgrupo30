<section class="evento">
    <h1>Descubre los mejores eventos</h1>
    <p>Conciertos, festivales y experiencias únicas en un solo lugar</p>
</section>

<section class="destacados">
    <h2>Eventos destacados</h2>

    <<div class="row">
        <div class="col-md-4 mb-4" *ngFor="let evento of eventos">
            <app-evento-component [evento]="evento"></app-evento-component>
        </div>
        </div>
</section>

<section class="cta">
    <h3>¿Listo para vivir la experiencia?</h3>
    <button routerLink="/eventos">Ver eventos ahora</button>
</section>
