<div class="container mt-4">

  <div class="card p-3">

    <div class="row">

      <!-- Imagen del evento-->
      <div class="col-md-5">
        <img [src]="evento.imagen" class="img-fluid w-100 imagen-detalle" alt="evento">
      </div>

      <!-- Información del evento -->
      <div class="col-md-7">

        <h3 class="mb-3">{{ evento.titulo }}</h3>

        <p><strong>Fecha:</strong> {{ evento.fecha }}</p>
        <p><strong>Lugar:</strong> {{ evento.lugar }}</p>
        <p><strong>Precio:</strong> {{ evento.precio }}</p>

        <div class="mb-3">
          <button class="btn btn-outline-dark me-2" (click)="agregarAFavoritos()" type="button">
            Agregar a favoritos
          </button>

          <button class="btn btn-outline-dark me-2" (click)="reservar()" type="button">
            Reservar
          </button>

          <button class="btn btn-outline-dark" (click)="contactar()">
            Contactar
          </button>
        </div>

        <p class="mt-3">
          {{ evento.descripcion }}
        </p>

      </div>

    </div>

  </div>

</div>

<!-- HTML para el modal de reserva -->
<div class="modal fade" id="modalReserva" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Reserva exitosa</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar">
        </button>
      </div>

      <div class="modal-body">
        <p>Tu reserva se realizó correctamente.</p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-primary" (click)="ir_a_Home()" type="button">
          Ir al inicio
        </button>
      </div>

    </div>
  </div>
</div>
