<div class="container mt-4" *ngIf="evento">

  <div class="card p-3">
    <div class="row">

      <!-- Imagen -->
      <div class="col-md-5">
        <img [src]="evento.imagen" class="img-fluid img-detalle" alt="evento">
      </div>

      <!-- Información -->
      <div class="col-md-7">
        <h3>{{ evento.titulo }}</h3>

        <p><strong>Fecha:</strong> {{ evento.fecha }}</p>
        <p><strong>Lugar:</strong> {{ evento.lugar }}</p>
        <p><strong>Precio:</strong> {{ evento.precio }}</p>

        <button class="btn btn-outline-dark me-2" (click)="agregarAFavoritos()" type="button">
          Agregar a favoritos
        </button>
        <button class="btn btn-outline-dark me-2">Reservar</button>
        <button class="btn btn-outline-dark">Contactar</button>

        <p class="mt-3">
          {{ evento.descripcion }}
        </p>
      </div>

    </div>
  </div>

</div>
