<div class="container mt-4">
  <h2>Crear evento</h2>

  <form #form="ngForm" (ngSubmit)="crearEvento(form)">

    <!-- Título -->
    <div class="mb-3">
      <input 
        type="text"
        class="form-control"
        name="titulo"
        [(ngModel)]="evento.titulo"
        required
        placeholder="Título"
        #titulo="ngModel">

      <div *ngIf="titulo.invalid && titulo.touched" class="text-danger">
        El título es obligatorio
      </div>
    </div>

    <!-- Descripción -->
    <div class="mb-3">
      <textarea 
        class="form-control"
        name="descripcion"
        [(ngModel)]="evento.descripcion"
        required
        placeholder="Descripción"
        #descripcion="ngModel">
      </textarea>

      <div *ngIf="descripcion.invalid && descripcion.touched" class="text-danger">
        La descripción es obligatoria
      </div>
    </div>

    <!-- Fecha -->
    <div class="mb-3">
      <input 
        type="date"
        class="form-control"
        name="fecha"
        [(ngModel)]="evento.fecha"
        required
        #fecha="ngModel">

      <div *ngIf="fecha.invalid && fecha.touched" class="text-danger">
        La fecha es obligatoria
      </div>
    </div>

    <!-- Lugar -->
    <div class="mb-3">
      <input 
        type="text"
        class="form-control"
        name="lugar"
        [(ngModel)]="evento.lugar"
        required
        placeholder="Lugar"
        #lugar="ngModel">

      <div *ngIf="lugar.invalid && lugar.touched" class="text-danger">
        El lugar es obligatorio
      </div>
    </div>

    <!-- Precio -->
    <div class="mb-3">
      <input 
        type="number"
        class="form-control"
        name="precio"
        [(ngModel)]="evento.precio"
        required
        placeholder="Precio"
        #precio="ngModel">

      <div *ngIf="precio.invalid && precio.touched" class="text-danger">
        El precio es obligatorio
      </div>
    </div>

    <!-- Imagen -->
    <div class="mb-3">
      <input 
        type="file"
        class="form-control"
        (change)="onFileChange($event)"
        required>

      <div *ngIf="!evento.imagen && form.submitted" class="text-danger">
        La imagen es obligatoria
      </div>
    </div>

    <!-- Preview -->
    <img 
      *ngIf="evento.imagen"
      [src]="evento.imagen"
      class="img-fluid mb-3"
      style="max-height: 200px;">

    <!-- Botón -->
    <button 
      class="btn btn-dark w-100"
      type="submit"
      [disabled]="form.invalid || !evento.imagen">
      Crear evento
    </button>

  </form>
</div>
