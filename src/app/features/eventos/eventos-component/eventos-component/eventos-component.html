<div class="container mt-4">
  <h2 class="mb-12">Eventos disponibles</h2>

  <div class="row">

    <!-- Eventos -->
    <div 
      class="col-12 col-sm-6 col-md-4 mb-4" 
      *ngFor="let evento of eventos">

      <app-evento-component
        [evento]="evento"
        [mostrarEliminar]="true"
        (eliminarEvento)="eliminar($event)">
      </app-evento-component>

    </div>

    <!-- Card crear evento -->
    <div class="col-12 col-sm-6 col-md-4 mb-4">

      <div 
        class="card h-100 shadow-sm d-flex flex-column crear-card"
        (click)="irACrearEvento()"
        style="cursor: pointer;">

        <!-- Simulación de imagen -->
        <div class="card-img-top d-flex justify-content-center align-items-center crear-img">
          <i class="fas fa-plus fa-2x"></i>
        </div>

        <!-- Contenido -->
        <div class="card-body d-flex flex-column text-center">

          <h5 class="card-title">Crear evento</h5>

          <p class="card-text">
            Agrega un nuevo evento
          </p>

          <button class="btn btn-outline-dark mt-auto" type="button">
            Crear
          </button>

        </div>

      </div>

    </div>

  </div>
</div>
