<div class="container mt-4">
  <h2 class="mb-12">Eventos disponibles</h2>

  <div class="row">
    <div 
      class="col-12 col-sm-6 col-md-4 mb-4" 
      *ngFor="let evento of eventos">
      
      <app-evento-component
        [tituloEvento]="evento.titulo"
        [descripcionEvento]="evento.descripcion"
        [imagenEvento]="getImagenRandom()">
      </app-evento-component>

    </div>
  </div>
</div>
