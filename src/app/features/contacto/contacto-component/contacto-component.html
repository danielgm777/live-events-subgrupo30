<div class="container mt-5">
    <h2 class="mb-4 text-center">Contacto</h2>

    <div class="card p-4 shadow-sm">
        <form (ngSubmit)="enviarFormulario()">

            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" [(ngModel)]="nombre" name="nombre"
                    placeholder="Ingresa tu nombre">
            </div>

            <div class="mb-3">
                <label class="form-label">Correo</label>
                <input type="email" class="form-control" [(ngModel)]="correo" name="correo"
                    placeholder="Ingresa tu correo">
            </div>

            <div class="mb-3">
                <label class="form-label">Mensaje</label>
                <textarea class="form-control" rows="4" [(ngModel)]="mensaje" name="mensaje"
                    placeholder="Escribe tu mensaje">
                </textarea>
            </div>

            <button type="submit" class="btn btn-dark w-100" aria-label="Enviar">
                Enviar mensaje
            </button>

        </form>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalMensaje" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">{{ tituloModal }}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar">
                </button>
            </div>

            <div class="modal-body">
                <p>{{ mensajeModal }}</p>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Cerrar
                </button>
            </div>

        </div>
    </div>
</div>
